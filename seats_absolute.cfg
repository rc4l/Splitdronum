// =================================================================================================
//  splitdronum -- ABSOLUTE seat config (seats_absolute.cfg)
//
//  The FINAL say. Every seat execs this LAST -- after the per-profile .ini, after seats_preferred.cfg,
//  and after the player's profile .cfg -- so whatever you set here WINS over all of them. Use it for
//  settings you want forced on every seat no matter which profile loads.
//
//  Precedence (low -> high): profile .ini  <  seats_preferred.cfg  <  profile .cfg  <  THIS (seats_absolute)
//
//  CAVEATS:
//   - "Final at load," not a live lock: a player can still change a forced cvar in-engine during a
//     session; it reverts on the next launch (this file re-asserts it at startup).
//   - It execs dead-last, so it can also override the host's own functional flags (use_mouse 0,
//     use_joystick 0, vid_defwidth/height, the music mute). Overriding those can break input/splitscreen
//     -- if you put them here, that's on you.
//
//  Add stock Zandronum cvars/commands below -- they win over every profile.
// =================================================================================================

// --- controller JOIN (keep): spare pad buttons open the spectator join screen, a no-op once joined.
//     Forced so a profile's rebinds can never strand a controller without a way to join. ---
bind pad_b "ifspectator menu_join"
bind pad_x "ifspectator menu_join"

// --- silence the connect sound: it otherwise fires once per player as all the seats join at once ---
cl_connectsound 0

// --- hide the co-op ally info panels (teammate name/health/ammo) drawn down the screen edges ---
cl_drawcoopinfo 0

// --- no mouse in menus (navigate with the keyboard / controller instead) ---
m_use_mouse 0
