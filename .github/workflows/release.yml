name: release

# Builds the cross-platform host + launcher on Windows and macOS, packages a per-OS zip, and (on a
# v* tag) publishes them as a GitHub release. workflow_dispatch builds + uploads artifacts without a
# release, so the pipeline can be verified with a green run before tagging.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'
          cache: true

      # Same Qt-6.8/macOS workaround as ci.yml: neutralize the AGL fallback + force a clean OpenGL framework.
      - name: Neutralize Qt AGL OpenGL link (macOS)
        if: runner.os == 'macOS'
        run: |
          f="$QT_ROOT_DIR/lib/cmake/Qt6/FindWrapOpenGL.cmake"
          sed -i '' 's|INTERFACE ${__opengl_fw_path})|INTERFACE "-framework OpenGL")|' "$f"
          sed -i '' '/INTERFACE ${__opengl_agl_fw_path})/d' "$f"

      # macOS target = x86_64 to match the Intel-only engine (see ci.yml).
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSS_BUILD_LAUNCHER=ON -DSS_BUILD_HOST=ON ${{ runner.os == 'macOS' && '-DCMAKE_OSX_ARCHITECTURES=x86_64' || '' }}

      - name: Build
        run: cmake --build build --config Release

      # --- Windows package: binaries + Qt runtime (windeployqt) + resources, zipped --------------------
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -e
          STAGE=splitdronum-windows
          mkdir -p "$STAGE"
          cp "$(find build -name host.exe | head -1)" "$STAGE/"
          cp "$(find build -name launcher.exe | head -1)" "$STAGE/"
          cp -r overlay "$STAGE/"
          [ -d assets ] && cp -r assets "$STAGE/" || true
          cp ./*.cfg "$STAGE/" 2>/dev/null || true
          cp play.ps1 "$STAGE/" 2>/dev/null || true
          cp README.md "$STAGE/" 2>/dev/null || true
          # bundle the Qt runtime (DLLs + QML plugins) next to each binary so the package runs standalone
          windeployqt --release --no-translations --qmldir overlay/qml "$STAGE/host.exe"
          windeployqt --release --no-translations --qmldir launcher/qml "$STAGE/launcher.exe"
          7z a "splitdronum-windows.zip" "$STAGE" >/dev/null

      # --- macOS package: binaries + resources, zipped. (Qt framework bundling via macdeployqt + .app
      #     bundles, and the engine-side capture dylib, are the remaining runtime steps -- see README.) --
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          set -e
          STAGE=splitdronum-macos
          mkdir -p "$STAGE"
          cp "$(find build -name host -type f -perm +111 | head -1)" "$STAGE/" || true
          cp "$(find build -name launcher -type f -perm +111 | head -1)" "$STAGE/" || true
          cp -r overlay "$STAGE/"
          [ -d assets ] && cp -r assets "$STAGE/" || true
          cp ./*.cfg "$STAGE/" 2>/dev/null || true
          cp README.md "$STAGE/" 2>/dev/null || true
          zip -r "splitdronum-macos.zip" "$STAGE" >/dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: splitdronum-${{ runner.os }}
          path: splitdronum-*.zip
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.zip
