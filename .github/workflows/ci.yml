name: ci

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'
          cache: true

      # Qt 6.8's WrapOpenGL find-module links Apple's AGL framework, which current macOS SDKs no longer
      # ship as a real binary (so the link errors out). Qt Quick uses Metal on macOS and doesn't need it,
      # so neutralize the AGL lookup -- the app then links and runs on modern macOS.
      - name: Neutralize Qt AGL OpenGL link (macOS)
        if: runner.os == 'macOS'
        run: |
          f="$QT_ROOT_DIR/lib/cmake/Qt6/FindWrapOpenGL.cmake"
          sed -i '' 's/find_library(WrapOpenGL_AGL NAMES AGL)/set(WrapOpenGL_AGL "")/' "$f"
          grep -n "WrapOpenGL_AGL" "$f" || true

      # macOS target = x86_64 to MATCH the engine, which ships Intel-only (Apple Silicon arm64 has no
      # working Zandronum audio). Uniform arch under Rosetta keeps host<->engine shared memory simple.
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSS_BUILD_LAUNCHER=ON ${{ runner.os == 'macOS' && '-DCMAKE_OSX_ARCHITECTURES=x86_64' || '' }}

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
