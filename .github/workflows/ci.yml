name: ci

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'
          cache: true

      # Qt 6.8's WrapOpenGL find-module links Apple's AGL framework, which current macOS SDKs no longer
      # ship as a real binary (so the link errors out). Qt Quick uses Metal on macOS and doesn't need it,
      # so neutralize the AGL lookup -- the app then links and runs on modern macOS.
      - name: Neutralize Qt AGL OpenGL link (macOS)
        if: runner.os == 'macOS'
        run: |
          f="$QT_ROOT_DIR/lib/cmake/Qt6/FindWrapOpenGL.cmake"
          # On current macOS SDK + newer CMake, Qt 6.8's WrapOpenGL (a) derives a bogus OpenGL framework path
          # (a bare '.', -> ld errno=21) and (b) falls back to linking the removed '-framework AGL'. Qt Quick
          # uses Metal and needs neither at runtime, so force a clean OpenGL framework link and drop AGL.
          sed -i '' 's|INTERFACE ${__opengl_fw_path})|INTERFACE "-framework OpenGL")|' "$f"
          sed -i '' '/INTERFACE ${__opengl_agl_fw_path})/d' "$f"
          echo "WrapOpenGL link lines:"; grep -n "WrapOpenGL::WrapOpenGL INTERFACE" "$f"

      # macOS target = x86_64 to MATCH the engine, which ships Intel-only (Apple Silicon arm64 has no
      # working Zandronum audio). Uniform arch under Rosetta keeps host<->engine shared memory simple.
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSS_BUILD_LAUNCHER=ON ${{ runner.os == 'macOS' && '-DCMAKE_OSX_ARCHITECTURES=x86_64' || '' }}

      - name: Build
        run: cmake --build build --config Release --verbose

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
