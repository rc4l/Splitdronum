// =================================================================================================
//  splitdronum -- global seat config (global_seats.cfg)
//
//  Every seat (each Zandronum client) execs this at startup -- it is the GLOBAL config for ALL
//  seats. These are stock Zandronum cvars and commands, anything you could type in the console. Edit
//  freely; changes take effect on the next ./play.ps1. Lines starting with // are comments.
//  (Per-seat config files that override this are planned for later.)
//
//  AUDIO: every seat plays sound effects (you hear all players); only seat 0 plays MUSIC -- the host
//  mutes music on the other seats so the same track doesn't play N times out of sync and phase. The
//  one-shot connect sound is silenced below (cl_connectsound 0).
// =================================================================================================

// --- controller JOIN (keep): spare pad buttons open the spectator join screen, a no-op once joined.
//     Only remove if you never use controllers. ---
bind pad_b "ifspectator menu_join"
bind pad_x "ifspectator menu_join"

// --- silence the connect sound: it otherwise fires once per player as all the seats join at once ---
cl_connectsound 0

// --- music level (the host keeps exactly one seat playing music). Keep it low so it sits under the
//     shared sound effects instead of dominating. 0 = off, 1 = full. ---
snd_musicvolume 0.05

// --- hide the co-op ally info panels (teammate name/health/ammo) drawn down the screen edges ---
cl_drawcoopinfo 0

// --- no mouse in menus (navigate with the keyboard / controller instead) ---
m_use_mouse 0

// --- add your own global defaults below (any console cvar/command). Examples: ---
// crosshair 1
// cl_identifytarget 0
// con_scaletext 2
