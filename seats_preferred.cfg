// =================================================================================================
//  splitdronum -- PREFERRED seat config (seats_preferred.cfg)
//
//  The BASELINE every seat (each Zandronum client) execs at startup. It is the lowest user layer:
//  a player's saved PROFILE overrides anything set here (and seats_absolute.cfg overrides everything).
//  Use it for defaults you want unless a profile says otherwise. Stock Zandronum cvars/commands --
//  anything you could type in the console. Edit freely; changes take effect on the next ./play.ps1.
//
//  Precedence (low -> high): profile .ini  <  THIS (seats_preferred)  <  profile .cfg  <  seats_absolute.cfg
//
//  AUDIO: every seat plays sound effects (you hear all players); only seat 0 plays MUSIC. snd_musicvolume
//  lives HERE (not in seats_absolute.cfg) on purpose: the host re-execs this file when it hands music to a
//  new seat, so the music level must be in the layer that re-exec touches.
// =================================================================================================

// --- music level (the host keeps exactly one seat playing music). Keep it low so it sits under the
//     shared sound effects instead of dominating. 0 = off, 1 = full. ---
snd_musicvolume 0.05

// --- add your own preferred defaults below (a profile can still override these). Examples: ---
// crosshair 1
// cl_identifytarget 0
// con_scaletext 2
